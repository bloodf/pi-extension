name: Bug report
description: Report reproducible incorrect behavior
title: "bug: "
labels: []
body:
  - type: markdown
    attributes:
      value: Do not include API keys, private endpoints, authorization headers, or full provider response bodies.
  - type: input
    id: version
    attributes:
      label: Extension version
    validations:
      required: true
  - type: dropdown
    id: host
    attributes:
      label: Host
      options:
        - Pi
        - OMP
        - Both
    validations:
      required: true
  - type: input
    id: host-version
    attributes:
      label: Host version
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Use synthetic credentials and public or local fixture endpoints.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
